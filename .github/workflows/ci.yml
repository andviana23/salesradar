name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-type-check:
    name: Lint & Type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check (frontend)
        working-directory: apps/web
        run: npm run type-check
        continue-on-error: true

      - name: Type check (backend)
        working-directory: apps/api
        run: npm run type-check
        continue-on-error: true

      - name: Lint (frontend)
        working-directory: apps/web
        run: npm run lint
        continue-on-error: true

      - name: Lint (backend)
        working-directory: apps/api
        run: npm run lint
        continue-on-error: true

  test-backend:
    name: Test backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: salesradar
          POSTGRES_PASSWORD: salesradar
          POSTGRES_DB: salesradar_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://salesradar:salesradar@localhost:5432/salesradar_test
        run: npx prisma migrate deploy
        continue-on-error: true

      - name: Run tests
        working-directory: apps/api
        env:
          DATABASE_URL: postgresql://salesradar:salesradar@localhost:5432/salesradar_test
          JWT_SECRET: test-secret-key
          NODE_ENV: test
        run: npm test
        continue-on-error: true

  test-frontend:
    name: Test frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        working-directory: apps/web
        run: npm test -- --passWithNoTests
        continue-on-error: true

      - name: Build
        working-directory: apps/web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
        run: npm run build
        continue-on-error: true
